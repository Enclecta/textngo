version: "3.9"
services:
  textngo:
    build:
      context: .
      dockerfile: Dockerfile
    image: textngo:latest
    ports:
      - "${TEXTNGO_PORT:-3002}:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
